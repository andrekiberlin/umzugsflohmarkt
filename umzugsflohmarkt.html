<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andreas' Flohmarkt – Umzugsverkauf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f2eb;
    --warm-white: #fdfaf6;
    --ink: #1a1610;
    --ink-light: #5a5048;
    --accent: #c0392b;
    --accent-light: #e8d5d3;
    --sold: #8a9a7a;
    --reserved: #c8a84b;
    --border: #ddd5c8;
    --card-bg: #ffffff;
    --shadow: 0 2px 12px rgba(26,22,16,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 41px
    );
  }
  .header-tag {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--reserved);
    margin-bottom: 1rem;
    border: 1px solid var(--reserved);
    padding: 0.25rem 0.75rem;
    border-radius: 2px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 0.6rem;
  }
  header h1 em {
    font-style: italic;
    color: var(--accent-light);
  }
  header p.subtitle {
    font-size: 0.95rem;
    color: #b8b0a8;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    padding: 1rem 2rem;
    background: var(--ink);
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--cream);
    display: block;
  }
  .stat-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
  }

  /* ── Controls ── */
  .controls {
    max-width: 1100px;
    margin: 2.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.5rem;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--warm-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="search"]:focus { border-color: var(--ink); }

  .filter-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 0.5rem 1rem;
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--ink-light); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--cream);
  }

  .result-count {
    font-size: 0.82rem;
    color: var(--ink-light);
    padding: 0.5rem 0;
    white-space: nowrap;
  }

  /* ── Grid ── */
  .grid {
    max-width: 1100px;
    margin: 2rem auto 4rem;
    padding: 0 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    scroll-margin-top: 5rem;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(26,22,16,0.13);
  }
  .card.sold { opacity: 0.6; }
  .card.hidden { display: none; }

  .card-img {
    aspect-ratio: 4/3;
    overflow: hidden;
    background: var(--cream);
    position: relative;
    isolation: isolate;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s, opacity 0.25s;
    position: absolute;
    inset: 0;
  }
  .card-img img.hidden-slide { opacity: 0; pointer-events: none; }

  .card-img .no-photo {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: var(--border);
  }

  /* Slider arrows */
  .slide-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(26,22,16,0.55);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    z-index: 2;
    transition: background 0.15s;
    padding: 0;
    line-height: 1;
  }
  .slide-btn:hover { background: rgba(26,22,16,0.85); }
  .slide-btn.prev { left: 8px; }
  .slide-btn.next { right: 8px; }

  /* Dot indicators */
  .slide-dots {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 2;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    border: none;
    padding: 0;
  }
  .dot.active { background: white; transform: scale(1.3); }

  /* Photo counter */
  .slide-counter {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(26,22,16,0.55);
    color: white;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 10px;
    z-index: 2;
    font-family: 'DM Sans', sans-serif;
  }

  .status-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
  }
  .badge-available { background: var(--ink); color: var(--cream); }
  .badge-reserved  { background: var(--reserved); color: white; }
  .badge-sold      { background: var(--sold); color: white; }

  .card-body {
    padding: 1rem 1.1rem 1.1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .card-cat {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
  }
  .card-desc {
    font-size: 0.83rem;
    color: var(--ink-light);
    line-height: 1.55;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    gap: 0.5rem;
  }
  .price {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
  }
  .price.vb::after {
    content: ' VB';
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--ink-light);
    font-family: 'DM Sans', sans-serif;
  }
  .price-old {
    font-size: 0.85rem;
    color: #aaa;
    text-decoration: line-through;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    margin-right: 0.3rem;
  }
  .price-wrap {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
    flex-wrap: wrap;
  }
  /* Tags */
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.2rem;
  }
  .tag-chip {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid #d8b8b6;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tag-chip:hover { background: #dfc5c3; }
  /* Tag-Filterleiste */
  .tag-filter-row {
    max-width: 1100px;
    margin: 0.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }
  .tag-filter-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-right: 0.3rem;
  }
  .tag-filter-btn {
    padding: 0.35rem 0.8rem;
    border: 1.5px solid #d8b8b6;
    background: var(--warm-white);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tag-filter-btn:hover { background: var(--accent-light); }
  .tag-filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .btn-ebay {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink);
    border: 1.5px solid var(--border);
    padding: 0.3rem 0.6rem;
    border-radius: 3px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-ebay:hover { border-color: var(--ink); background: var(--cream); }

  .btn-contact {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
    font-weight: 500;
    color: white;
    background: var(--accent);
    border: 1.5px solid var(--accent);
    padding: 0.3rem 0.7rem;
    border-radius: 3px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-contact:hover { background: #a93226; border-color: #a93226; }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--ink-light);
  }
  .empty-state p { font-size: 1.1rem; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--ink-light);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .stats-bar { gap: 1.5rem; }
    .controls { flex-direction: column; align-items: stretch; }
    .filter-group { justify-content: flex-start; }
  }

  /* ── Lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,6,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    cursor: default;
  }
  .lightbox-close {
    position: absolute;
    top: 1.2rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-prev, .lightbox-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    font-size: 2rem;
    width: 48px;
    height: 64px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    opacity: 0.8;
  }
  .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.25); opacity: 1; }
  .lightbox-prev { left: 1rem; }
  .lightbox-next { right: 1rem; }
  .lightbox-counter {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
  }
  .card-img img { cursor: zoom-in; pointer-events: none; }
  .card-img { cursor: zoom-in; }
</style>
</head>
<body>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <button class="lightbox-prev" onclick="lightboxStep(-1, event)">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-next" onclick="lightboxStep(1, event)">&#8250;</button>
  <span class="lightbox-counter" id="lightbox-counter"></span>
</div>

<div class="controls">

  </div>
  <span class="result-count" id="result-count"></span>
</div>

<div class="tag-filter-row" id="tag-filter-row" style="display:none"><span class="tag-filter-label">Tags:</span></div>

<div class="grid" id="grid"></div>

<footer>
  Kontakt: <a href="mailto:akgoodnews@gmail.com">akgoodnews@gmail.com</a> &nbsp;·&nbsp; Abholung in 14167 Berlin &nbsp;·&nbsp; Stand: <span id="last-updated"></span>

// ════════════════════════════════════════════════════
//  Ab hier nichts mehr ändern (außer du willst)
// ════════════════════════════════════════════════════

const statusLabel = { available: "Verfügbar", reserved: "Reserviert", sold: "Verkauft" };
const statusClass  = { available: "badge-available", reserved: "badge-reserved", sold: "badge-sold" };

let activeStatus = "all";
let activeCat    = "all";

function buildCategoryFilters() {
  const cats = ["all", ...new Set(ITEMS.map(i => i.cat))];
  const wrap = document.getElementById("cat-filters");
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (c === "all" ? " active" : "");
    btn.textContent = c === "all" ? "Alle Kategorien" : c;
    btn.dataset.cat = c;
    btn.onclick = () => setCat(btn);
    wrap.appendChild(btn);
  });
}

function setCat(btn) {
  document.querySelectorAll("#cat-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeCat = btn.dataset.cat;
  applyFilters();
}

function setStatus(btn) {
  document.querySelectorAll("#status-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeStatus = btn.dataset.status;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  let visible = 0;
  ITEMS.forEach(item => {
    const card = document.getElementById("card-" + item.id);
    const matchCat    = activeCat === "all" || item.cat === activeCat;
    const matchTag    = activeTag === "all" || (item.tags && item.tags.includes(activeTag));
    const matchStatus = activeStatus === "all" || item.status === activeStatus;
    const matchSearch = !q || item.title.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q) || item.cat.toLowerCase().includes(q);
    const show = matchCat && matchStatus && matchSearch && matchTag;
    card.classList.toggle("hidden", !show);
    if (show) visible++;
  });
  document.getElementById("result-count").textContent = visible + " Artikel";

  const empty = document.getElementById("empty-state");
  if (empty) empty.style.display = visible === 0 ? "block" : "none";
}

function buildStats() {
  const total = ITEMS.length;
  const sold  = ITEMS.filter(i => i.status === "sold").length;
  const avail = ITEMS.filter(i => i.status === "available").length;
  document.getElementById("cnt-total").textContent     = total;
  document.getElementById("cnt-available").textContent = avail;
  document.getElementById("cnt-sold").textContent      = sold;
}

// Slider state: { cardId: currentIndex }
const sliderState = {};

function buildImgArea(item) {
  const photos = item.photos || [];

  if (photos.length === 0) {
    return `<div class="no-photo">📦</div>`;
  }

  if (photos.length === 1) {
    return `<img src="${photos[0]}" alt="${item.title}" loading="lazy">`;
  }

  // Multiple photos → slider
  sliderState[item.id] = 0;
  const imgs = photos.map((src, i) =>
    `<img src="${src}" alt="${item.title} Foto ${i+1}" loading="lazy" class="${i === 0 ? '' : 'hidden-slide'}" data-idx="${i}" onclick="openLightbox(${JSON.stringify(photos)}, ${i})">`
  ).join("");

  const dots = photos.map((_, i) =>
    `<button class="dot${i === 0 ? ' active' : ''}" data-idx="${i}" onclick="goSlide(${item.id},${i},event)"></button>`
  ).join("");

  return `
    ${imgs}
    <button class="slide-btn prev" onclick="stepSlide(${item.id},-1,event)">&#8249;</button>
    <button class="slide-btn next" onclick="stepSlide(${item.id}, 1,event)">&#8250;</button>
    <div class="slide-dots">${dots}</div>
    <span class="slide-counter" id="counter-${item.id}">1 / ${photos.length}</span>`;
}

function goSlide(itemId, idx, e) {
  if (e) e.stopPropagation();
  const card = document.getElementById("card-" + itemId);
  const imgs = card.querySelectorAll(".card-img img");
  const dots = card.querySelectorAll(".dot");
  const counter = card.querySelector(".slide-counter");
  imgs.forEach((img, i) => img.classList.toggle("hidden-slide", i !== idx));
  dots.forEach((d, i) => d.classList.toggle("active", i === idx));
  sliderState[itemId] = idx;
  if (counter) counter.textContent = (idx + 1) + " / " + imgs.length;
}

function stepSlide(itemId, dir, e) {
  if (e) e.stopPropagation();
  const card = document.getElementById("card-" + itemId);
  const imgs = card.querySelectorAll(".card-img img");
  const total = imgs.length;
  const next = ((sliderState[itemId] || 0) + dir + total) % total;
  goSlide(itemId, next, null);
}

function renderCards() {
  const grid = document.getElementById("grid");

  ITEMS.forEach(item => {
    const card = document.createElement("div");
    card.className = "card" + (item.status === "sold" ? " sold" : "");
    card.id = "card-" + item.id;

    const ebayBtn = item.ebay
      ? `<a class="btn-ebay" href="${item.ebay}" target="_blank" rel="noopener">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
           Ebay
         </a>`
      : "";

    const contact = item.contact || CONTACT_DEFAULT;
    const contactBtn = item.status !== "sold"
      ? `<a class="btn-contact" href="mailto:${contact}?subject=Interesse: ${encodeURIComponent(item.title)}">Anfragen</a>`
      : "";

    const photos = item.photos || [];

    card.innerHTML = `
      <div class="card-img" style="${photos.length > 0 ? 'cursor:zoom-in' : ''}">
        ${buildImgArea(item)}
        <span class="status-badge ${statusClass[item.status]}">${statusLabel[item.status]}</span>
      </div>
      <div class="card-body">
        <span class="card-cat">${item.cat}</span>
        ${(item.tags && item.tags.length) ? `<div class="card-tags">${item.tags.map(t => `<span class="tag-chip" onclick="setTagFilter('${t}', event)">${t}</span>`).join('')}</div>` : ''}
        <div class="card-title">${item.title}</div>
        <p class="card-desc">${item.desc}</p>
        <div class="card-footer">
          <div class="price-wrap">
            ${item.oldPrice ? `<span class="price-old">€ ${item.oldPrice}</span>` : ''}
            <span class="price${item.vb ? ' vb' : ''}">€ ${item.price}</span>
          </div>
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap;justify-content:flex-end">
            ${ebayBtn}
            ${contactBtn}
          </div>
        </div>
      </div>`;

    // Lightbox: Klick auf card-img per addEventListener (vermeidet JSON-Anführungszeichen-Probleme)
    if (photos.length > 0) {
      const imgArea = card.querySelector(".card-img");
      imgArea.addEventListener("click", function(e) {
        // Slider-Buttons nicht abfangen
        if (e.target.classList.contains("slide-btn") || e.target.classList.contains("dot")) return;
        const idx = sliderState[item.id] || 0;
        openLightbox(photos, idx);
      });
    }

    grid.appendChild(card);
  });

  // Empty state placeholder
  const empty = document.createElement("div");
  empty.className = "empty-state";
  empty.id = "empty-state";
  empty.style.display = "none";
  empty.innerHTML = "<p>Keine Artikel gefunden.</p>";
  grid.appendChild(empty);
}


function init() {
  buildStats();
  buildCategoryFilters();
  buildTagFilters();
  renderCards();
  applyFilters();
  document.getElementById("last-updated").textContent = new Date().toLocaleDateString("de-DE");

  // Direktlink-Unterstützung: #card-3 scrollt zum Artikel
  if (location.hash) {
    const hash = location.hash.replace("#card-card-", "#card-").replace(/^#(?!card-)/, "#card-");
    const target = document.querySelector(hash);
    if (target) {
      // Kurz warten bis Bilder geladen und Layout stabil ist
      setTimeout(() => {
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        // Kurz hervorheben
        target.style.outline = "3px solid var(--accent)";
        target.style.outlineOffset = "4px";
        setTimeout(() => { target.style.outline = ""; target.style.outlineOffset = ""; }, 2000);
      }, 800);
    }
  }
}

// ── Lightbox ──
let lbPhotos = [];
let lbIndex  = 0;

function openLightbox(photos, idx) {
  lbPhotos = photos;
  lbIndex  = idx;
  showLightboxSlide();
  document.getElementById("lightbox").classList.add("open");
  document.addEventListener("keydown", lightboxKey);
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById("lightbox") && !e.target.classList.contains("lightbox-close")) return;
  document.getElementById("lightbox").classList.remove("open");
  document.removeEventListener("keydown", lightboxKey);
}

function lightboxStep(dir, e) {
  if (e) e.stopPropagation();
  lbIndex = (lbIndex + dir + lbPhotos.length) % lbPhotos.length;
  showLightboxSlide();
}

function showLightboxSlide() {
  document.getElementById("lightbox-img").src = lbPhotos[lbIndex];
  const counter = document.getElementById("lightbox-counter");
  counter.textContent = lbPhotos.length > 1 ? (lbIndex + 1) + " / " + lbPhotos.length : "";
  document.querySelector(".lightbox-prev").style.display = lbPhotos.length > 1 ? "" : "none";
  document.querySelector(".lightbox-next").style.display = lbPhotos.length > 1 ? "" : "none";
}

function lightboxKey(e) {
  if (e.key === "ArrowRight") lightboxStep(1, null);
  if (e.key === "ArrowLeft")  lightboxStep(-1, null);
  if (e.key === "Escape")     {
    document.getElementById("lightbox").classList.remove("open");
    document.removeEventListener("keydown", lightboxKey);
  }
}

// ── Tag-Filter ──
let activeTag = "all";

function buildTagFilters() {
  const allTags = [...new Set(ITEMS.flatMap(i => i.tags || []))];
  if (allTags.length === 0) return;

  const row = document.getElementById("tag-filter-row");
  row.style.display = "flex";

  const allBtn = document.createElement("button");
  allBtn.className = "tag-filter-btn active";
  allBtn.textContent = "Alle";
  allBtn.dataset.tag = "all";
  allBtn.onclick = () => setTagFilter("all", null, allBtn);
  row.appendChild(allBtn);

  allTags.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "tag-filter-btn";
    btn.textContent = tag;
    btn.dataset.tag = tag;
    btn.onclick = () => setTagFilter(tag, null, btn);
    row.appendChild(btn);
  });
}

function setTagFilter(tag, e, btn) {
  if (e) e.stopPropagation();
  activeTag = tag;
  document.querySelectorAll(".tag-filter-btn").forEach(b => b.classList.toggle("active", b.dataset.tag === tag));
  applyFilters();
  if (tag !== "all") {
    document.getElementById("tag-filter-row").scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

document.addEventListener("DOMContentLoaded", init);
</script>
